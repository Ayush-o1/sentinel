# Alembic Configuration for SENTINEL
# https://alembic.sqlalchemy.org/

[alembic]
# Path to migration scripts
script_location = app/db/migrations

# Timezone for timestamps in migration files
timezone = UTC

# Template used to generate migration file names.
# Default: %(rev)s_%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Max length of the "slug" portion of the migration filename
truncate_slug_length = 40

# Version path separator (os, colon, semicolon, space)
version_path_separator = os

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
