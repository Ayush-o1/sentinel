[pytest]
# Run all async tests automatically without @pytest.mark.asyncio on every method
asyncio_mode = auto

# Where to find tests
testpaths = tests

# Short tracebacks by default; use -v for verbose output
addopts = --tb=short

# Suppress known noisy deprecation warnings from third-party libs
filterwarnings =
    ignore::DeprecationWarning:passlib.*:
    ignore::DeprecationWarning:jose.*:
